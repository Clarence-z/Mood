spring.application.name=demo
# ????

# ?????
spring.datasource.url=jdbc:mysql://localhost:3306/${database_name}?useSSL=false
spring.datasource.username=${username}
spring.datasource.password=${password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.type=com.alibaba.druid.pool.DruidDataSource

mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java

# ??????
spring.servlet.multipart.max-file-size=10MB

# Dify API
dify.api.url=http://localhost/v1/chat-messages
dify.api.key={dify_api_key}

spring.mvc.async.request-timeout=60s

# WebClient
spring.web.client.timeout.connect=10000
spring.web.client.timeout.read=60000